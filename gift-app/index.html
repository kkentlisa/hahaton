<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BdayHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profiles.css">
</head>
<body>

<header class="site-header">
    <div class="site-header__logo">
        <span class="site-header__logo-badge">
            <i data-lucide="party-popper" style="width:18px;"></i>
        </span>
        BdayHub
    </div>
    <div style="display:flex; gap:8px;">
        <a href="my-profile.html" class="btn btn-primary">Мой профиль</a>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Выйти</button>
    </div>
</header>

<main class="page-container">
    <div id="notification-zone" style="margin-bottom: var(--space-xl);"></div>

    <div class="filter-bar">
        <button class="filter-btn is-active" data-filter="all">Все пользователи</button>
        <button class="filter-btn" data-filter="friends">Друзья</button>
    </div>

    <div class="friends-grid" id="friends-container"></div>
</main>

<script type="module">
    import { db } from "./js/config.js";
    import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { watchAuthState } from "./js/auth.js";

    window.db = db;

    let currentUserId = null;
    let allUsers = [];

    watchAuthState((user) => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        currentUserId = user.uid;
        window.currentUserId = user.uid;
    });

    onSnapshot(collection(db, "users"), (snapshot) => {
        allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        window.allUsers = allUsers;
    });

    window.arrayUnion = function(...items) {
        return items;
    };
    window.arrayRemove = function(item) {
        return item;
    };

    document.addEventListener('user-data-updated', () => {});
</script>

<script type="module" src="js/profiles.js"></script>
<script type="module" src="js/notifications.js"></script>

</body>
</html>
