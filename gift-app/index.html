<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BdayHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/friends-grid.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<header class="site-header">
    <div class="site-header__logo">
        <span class="site-header__logo-badge">
            <i data-lucide="party-popper" style="width:18px;"></i>
        </span>
        BdayHub
    </div>
    <div style="display:flex; gap:8px;">
        <a href="my-profile.html" class="btn btn-primary">Мой профиль</a>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Выйти</button>
    </div>
</header>

<main class="page-container">
    <div id="notification-zone" style="margin-bottom: var(--space-xl);"></div>

    <div class="filter-bar" id="filter-bar">
        <button class="filter-btn is-active" data-filter="all">Все пользователи</button>
        <button class="filter-btn" data-filter="friends">Друзья</button>
    </div>

    <div class="friends-grid" id="friends-container"></div>
</main>

<template id="friend-card-template">
    <a class="friend-card">
        <div class="friend-card__banner">
            <span class="friend-card__banner-countdown">
                <strong class="js-days"></strong>
                <span class="js-days-text"></span>
            </span>
            <span class="friend-badge js-friend-badge" hidden>👥 В друзьях</span>
        </div>
        <div class="friend-card__avatar js-avatar"></div>
        <div class="friend-card__body">
            <div class="friend-card__name js-name"></div>
            <div class="friend-card__date js-date"></div>
            <div class="friend-card__groups js-groups"></div>
            <div class="wishlist-count">
                <i data-lucide="gift" style="width:14px;"></i>
                <span class="js-gifts-count"></span>
            </div>
        </div>
    </a>
</template>

<template id="empty-state-template">
    <div class="empty-state">
        <p class="empty-state__text"></p>
    </div>
</template>

<script type="module" src="js/profiles.js"></script>
<script type="module" src="js/notifications.js"></script>

</body>
</html>
