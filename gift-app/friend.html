<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница друга — WishBird</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profiles.css" />
    <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

<header class="site-header">
    <a href="index.html" class="site-header__logo">
        <img src="assets/logo.png" alt="" width="32" height="32" onerror="this.style.display='none'" />
        WishBird
    </a>
    <nav class="site-header__nav">
        <a href="index.html" class="btn btn-ghost">← Все друзья</a>
    </nav>
</header>

<main class="friend-page">

    <aside class="friend-profile" id="js-friend-profile">
    </aside>

    <section class="chat-wrap">

        <div class="chat-head">
            <div class="chat-head__avatar" id="js-chat-avatar">
                <img src="assets/default-avatar.png" alt=""
                     onerror="this.parentElement.dataset.fallback=this.parentElement.dataset.initials||'?'" />
            </div>
            <div class="chat-head__info">
                <span class="chat-head__name" id="js-chat-name">Обсуждение подарка</span>
                <span class="chat-head__sub">только для друзей · именинник не видит</span>
            </div>
            <div class="chat-head__actions">
                <button class="chat-icon-btn" id="js-search-toggle" title="Поиск">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="chat-pinned" id="js-pinned" style="display:none">
            <div class="chat-pinned__bar"></div>
            <div class="chat-pinned__body">
                <span class="chat-pinned__label">Закреплено</span>
                <span class="chat-pinned__text" id="js-pinned-text"></span>
            </div>
            <svg class="chat-pinned__close" id="js-pinned-close" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>

        <div class="chat-messages" id="js-chat-messages">
            <div class="chat-empty">
                <div class="chat-empty__icon">🎁</div>
                <p class="chat-empty__title">Начните обсуждение</p>
                <p class="chat-empty__sub">Выберите подарок и договоритесь с друзьями</p>
            </div>
        </div>

        <div class="chat-composer">
            <form class="chat-form" id="js-chat-form" autocomplete="off">
                <button type="button" class="chat-icon-btn" title="Вложение">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input
                        class="chat-input"
                        id="js-chat-input"
                        type="text"
                        placeholder="Сообщение…"
                        maxlength="500"
                />
                <button class="chat-send" type="submit" aria-label="Отправить">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </form>
        </div>

    </section>

</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore }   from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp({
        apiKey:            "AIzaSyAe4ZXtxKH119CrCWBXM7ZjXDyiH5n3tjU",
        authDomain:        "birthday-wishes-hits.firebaseapp.com",
        projectId:         "birthday-wishes-hits",
        storageBucket:     "birthday-wishes-hits.appspot.com",
        messagingSenderId: "650338158827",
        appId:             "1:650338158827:web:0bd1caba97a65a2de1d6ae"
    });
    window.db = getFirestore(app);
    window.dispatchEvent(new Event("firebase-ready"));
</script>

<script type="module" src="js/profiles.js"></script>

<script type="module" src="js/notifications.js"></script>

<script type="module">
    import { initChatInterface } from "./js/chat.js";

    const params   = new URLSearchParams(location.search);
    const friendId = params.get("id") || "default";

    function getCurrentUserName() {
        if (window.currentUser?.name) return window.currentUser.name;
        return localStorage.getItem("wishbird_username") || "Гость";
    }

    window.addEventListener("firebase-ready", () => {
        initChatInterface(
            `friend_${friendId}`,
            "js-chat-form",
            "js-chat-input",
            "js-chat-messages",
            getCurrentUserName()
        );
    });

    window.addEventListener("chat-pinned-update", (e) => {
        const wrap = document.getElementById("js-pinned");
        const txt  = document.getElementById("js-pinned-text");
        if (e.detail) {
            wrap.style.display = "flex";
            txt.textContent    = e.detail;
        } else {
            wrap.style.display = "none";
        }
    });

    document.getElementById("js-pinned-close")?.addEventListener("click", () => {
        document.getElementById("js-pinned").style.display = "none";
    });
</script>

</body>
</html>
