<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BdayHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module" src="https://unpkg.com/emoji-picker-element@^1/index.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profiles.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<header class="site-header">
    <div class="site-header__logo">
        <span class="site-header__logo-badge">
            <i data-lucide="party-popper" style="width:18px;"></i>
        </span>
        BdayHub
    </div>
    <div style="display:flex; gap:8px;">
        <a href="my-profile.html" class="btn btn-primary">Мой профиль</a>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Выйти</button>
    </div>
</header>

<main class="page-container">
    <a href="index.html" class="back-link">
        <i data-lucide="arrow-left" style="width:16px;"></i>
        Все друзья
    </a>

    <div class="friend-layout">
        <div id="friend-profile-content"></div>

        <aside class="chat-wrap">

            <div class="chat-overlay" id="js-chat-overlay">
                <div class="chat-overlay__card">
                    <div class="chat-overlay__icon">🔒</div>
                    <p class="chat-overlay__title">Чат недоступен</p>
                    <p class="chat-overlay__sub">Добавьте пользователя в друзья, чтобы видеть обсуждение подарка</p>
                </div>
            </div>
            <div class="chat-head">
                <div class="chat-head__avatar" id="js-chat-avatar">
                    <img src="assets/default-avatar.png" alt="" onerror="this.style.display='none'; this.parentElement.textContent='🎂'" />
                </div>
                <div class="chat-head__info">
                    <span class="chat-head__name" id="js-chat-name">Обсуждение подарка</span>
                    <span class="chat-head__sub">только для друзей · именинник не видит</span>
                </div>
            </div>

            <div class="chat-messages" id="js-chat-messages"></div>

            <div class="chat-composer">
                <form class="chat-form" id="js-chat-form" autocomplete="off">
                    <button type="button" class="chat-icon-btn" id="js-emoji-btn" title="Эмодзи">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                    </button>
                    <input class="chat-input" id="js-chat-input" type="text" placeholder="Написать сообщение…" maxlength="500"/>
                    <button class="chat-send" type="submit" aria-label="Отправить">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </form>
                <emoji-picker id="js-emoji-picker" class="emoji-popup" style="display:none"></emoji-picker>
            </div>
        </aside>
    </div>
</main>

<script type="module" src="js/profiles.js"></script>
<script type="module" src="js/notifications.js"></script>

<script type="module">
    import { db } from "./js/config.js";
    import { initChatInterface, initChatOverlay } from "./js/chat.js";

    window.db = db;

    const params = new URLSearchParams(location.search);
    const friendId = params.get("id") || "default";

    function startChat() {
        const userName = window.currentUser?.name || "Гость";
        initChatInterface(
            `friend_${friendId}`,
            "js-chat-form",
            "js-chat-input",
            "js-chat-messages",
            userName
        );
        initChatOverlay(friendId);
    }

    if (window.currentUser) {
        startChat();
    } else {
        window.addEventListener("currentUser-ready", startChat);
    }

    const emojiBtn = document.getElementById("js-emoji-btn");
    const emojiPicker = document.getElementById("js-emoji-picker");
    const chatInput = document.getElementById("js-chat-input");

    function closeEmojiPicker() {
        emojiPicker.style.display = "none";
    }

    function toggleEmojiPicker() {
        emojiPicker.style.display = (emojiPicker.style.display === "none") ? "block" : "none";
    }

    emojiBtn?.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleEmojiPicker();
    });

    emojiPicker?.addEventListener("emoji-click", (event) => {
        const emoji = event.detail.unicode;
        const start = chatInput.selectionStart ?? chatInput.value.length;
        const end = chatInput.selectionEnd ?? chatInput.value.length;
        chatInput.value = chatInput.value.slice(0, start) + emoji + chatInput.value.slice(end);
        const cursor = start + emoji.length;
        chatInput.focus();
        chatInput.setSelectionRange(cursor, cursor);
    });

    document.addEventListener("click", (e) => {
        if (emojiPicker.style.display !== "none" &&
            !emojiPicker.contains(e.target) &&
            e.target !== emojiBtn &&
            !emojiBtn.contains(e.target)) {
            closeEmojiPicker();
        }
    });

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeEmojiPicker();
    });
</script>
</body>
</html>
