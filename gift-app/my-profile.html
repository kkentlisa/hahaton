<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bday</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/friends-grid.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<header class="site-header">
    <div class="site-header__logo">
        <span class="site-header__logo-badge">
            <i data-lucide="party-popper" style="width:18px;"></i>
        </span>
        Bday
    </div>
    <div style="display:flex; gap:8px;">
        <a href="index.html" class="btn btn-ghost">
            <i data-lucide="arrow-left" style="width:16px;"></i>
            Назад
        </a>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Выйти</button>
    </div>
</header>

<main class="page-container">
    <div id="my-hero-container"></div>

    <section class="groups-section">
        <div class="section-header">
            <h2>Мои группы</h2>
        </div>
        <div id="my-groups-container"></div>
    </section>

    <section>
        <div class="section-header">
            <h2>Мой список подарков</h2>
        </div>
        <div id="my-wishlist-container"></div>
    </section>
</main>

<template id="my-profile-hero-template">
    <section class="profile-hero">
        <div class="profile-hero__banner"></div>
        <div class="profile-hero__body">
            <div class="profile-hero__avatar js-avatar"></div>
            <div class="profile-hero__info">
                <h1 class="profile-hero__name js-name"></h1>
                <div class="profile-hero__date">
                    <i data-lucide="calendar" style="width:16px; vertical-align:middle;"></i>
                    <span class="js-date"></span>
                </div>
                <div class="profile-hero__groups js-groups"></div>
            </div>
        </div>
    </section>
</template>

<template id="my-groups-template">
    <div class="groups-list js-groups-list"></div>
    <div class="groups-available js-groups-available"></div>
    <div class="groups-create">
        <form id="groupCreateForm" class="inline-form">
            <input type="text" id="groupCreateInput" placeholder="Название новой группы" class="input-field" required>
            <button type="submit" class="btn btn-primary btn-sm">Создать группу</button>
        </form>
    </div>
</template>

<template id="my-wishlist-template">
    <div class="wishlist-items js-wishlist-items"></div>
    <div class="gift-add">
        <form id="giftAddForm" class="inline-form">
            <input type="text" id="giftAddInput" placeholder="Название подарка" class="input-field" required>
            <button type="submit" class="btn btn-primary btn-sm">Добавить подарок</button>
        </form>
    </div>
</template>

<template id="group-chip-template">
    <div class="group-chip">
        <span class="js-group-name"></span>
        <button class="btn-group-leave" data-group="" title="Выйти из группы">×</button>
    </div>
</template>

<template id="wishlist-item-template">
    <div class="wishlist-item">
        <div class="wishlist-item__icon">
            <i data-lucide="gift" style="width:18px;"></i>
        </div>
        <span class="wishlist-item__title js-title"></span>
        <button class="btn-gift-remove" data-gift="" title="Удалить">×</button>
    </div>
</template>

<template id="empty-chip-template">
    <span class="chip-muted js-empty-text"></span>
</template>

<script type="module" src="js/profiles.js"></script>
</body>
</html>
