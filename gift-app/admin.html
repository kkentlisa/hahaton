<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Админ-панель</h1>

    <div class="flex border-b mb-6">
        <button class="admin-tab admin-tab-active px-4 py-2 font-semibold" data-target="panel-users">Пользователи</button>
        <button class="admin-tab px-4 py-2 font-semibold" data-target="panel-groups">Группы</button>
        <button class="admin-tab px-4 py-2 font-semibold" data-target="panel-import">Импорт</button>
    </div>

    <div id="panel-users" class="admin-panel">
        <div class="flex justify-end mb-4">
            <button onclick="window.openUserModal()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">
                + Новый пользователь
            </button>
        </div>
        <table class="min-w-full bg-white border border-gray-200">
            <thead>
            <tr class="bg-gray-100 text-left">
                <th class="p-3 border">Имя</th>
                <th class="p-3 border">Дата рождения</th>
                <th class="p-3 border">Группы</th>
                <th class="p-3 border">Подарки</th>
                <th class="p-3 border">Действия</th>
            </tr>
            </thead>
            <tbody id="usersList"></tbody>
        </table>
    </div>

    <div id="panel-groups" class="admin-panel hidden">
        <form id="groupForm" class="mb-6 flex gap-2">
            <input id="groupName" type="text" placeholder="Название группы" class="flex-1 p-2 border rounded" required>
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700">Создать группу</button>
        </form>
        <table class="min-w-full bg-white border border-gray-200">
            <thead>
            <tr class="bg-gray-100 text-left">
                <th class="p-3 border">Название</th>
                <th class="p-3 border">Участников</th>
                <th class="p-3 border">Действия</th>
            </tr>
            </thead>
            <tbody id="groupsList"></tbody>
        </table>
    </div>

    <div id="panel-import" class="admin-panel hidden">
        <h2 class="text-xl font-bold mb-2">Импорт пользователей (JSON)</h2>
        <textarea id="jsonInput" class="w-full h-40 p-2 border rounded font-mono text-sm"
                  placeholder='[{"name": "Иван", "birthday": "2000-01-01", "gifts": ["Книга"], "groups": ["HITS"]}]'></textarea>
        <button onclick="window.importUsers()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700">
            Добавить пользователей
        </button>
    </div>
</div>

<div id="userModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg max-w-lg w-full p-6">
        <h2 id="userModalTitle" class="text-xl font-bold mb-4">Новый пользователь</h2>
        <form id="userForm">
            <label class="block mb-3">
                <span class="text-sm font-semibold">Имя</span>
                <input id="userName" type="text" class="w-full p-2 border rounded mt-1" required>
            </label>
            <label class="block mb-3">
                <span class="text-sm font-semibold">Дата рождения</span>
                <input id="userBirthday" type="date" class="w-full p-2 border rounded mt-1" required>
            </label>
            <div class="mb-3">
                <span class="text-sm font-semibold">Группы</span>
                <div id="userGroupCheckboxes" class="mt-1"></div>
            </div>
            <label class="block mb-4">
                <span class="text-sm font-semibold">Желаемые подарки (по одному в строке)</span>
                <textarea id="userGifts" class="w-full h-24 p-2 border rounded mt-1"></textarea>
            </label>
            <div class="flex justify-end gap-2">
                <button type="button" onclick="window.closeUserModal()" class="px-4 py-2 rounded font-bold text-gray-600 hover:bg-gray-100">Отмена</button>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
