<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Управление пользователями</h1>

    <div class="mb-8 p-4 bg-gray-200 rounded">
        <h2 class="text-xl font-bold mb-2">Импорт пользователей (JSON)</h2>
        <textarea id="jsonInput" class="w-full h-32 p-2 border rounded" placeholder='[{"name": "Иван", "birthday": "2000-01-01", "gifts": [], "groups": ["HITS"]}]'></textarea>
        <button onclick="window.importUsers()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700">
            Добавить пользователей
        </button>
    </div>

    <table class="min-w-full bg-white border border-gray-200">
        <thead>
        <tr class="bg-gray-100 text-left">
            <th class="p-3 border">Имя</th>
            <th class="p-3 border">Дата рождения</th>
            <th class="p-3 border">Группы</th>
            <th class="p-3 border">Подарки</th>
            <th class="p-3 border">Действия</th>
        </tr>
        </thead>
        <tbody id="usersList"></tbody>
    </table>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
